<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <!-- Botón para volver a la Home -->
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Ajustes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Header colapsable para iOS -->
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Ajustes</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="perfil-avatar">
    <button type="button" class="avatar-button" (click)="addPhoto()">
      <div class="avatar-wrapper">
        <img *ngIf="photoService.foto; else sinFoto" [src]="photoService.foto" class="avatar-img" alt="Foto de perfil" />
        <ng-template #sinFoto>
        <div *ngIf="!photoService.foto" class="avatar-placeholder">
          <ion-icon name="camera-outline"></ion-icon>
        </div>
        </ng-template>
      </div>
      <span class="avatar-hint">Toca para cambiar foto</span>
    </button>
  </div>

  <!-- Nuestra lista de configuración -->
  <ion-list>
    <!-- Sección de Perfil -->
    <ion-list-header>Perfil</ion-list-header>
    <ion-item>
      <ion-label position="floating">Tu Nombre</ion-label>
      <ion-input 
        [(ngModel)]="nombre" 
        (ngModelChange)="guardarNombre()"
        placeholder="Ingresa tu nombre">
      </ion-input>
    </ion-item>

    <ion-item lines="none">
      <ion-button expand="block" (click)="alternarModoOscuro()">
        {{ modoOscuro ? 'Desactivar modo oscuro' : 'Activar modo oscuro' }}
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Mi Ubicación</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p *ngIf="locationService.latitud == null">Sin datos GPS</p>

      <div *ngIf="locationService.latitud != null && locationService.longitud != null">
        <p>Lat: {{ locationService.latitud }}</p>
        <p>Long: {{ locationService.longitud }}</p>

        <ion-button
          [href]="'https://www.google.com/maps/search/?api=1&query=' + locationService.latitud + ',' + locationService.longitud"
          target="_blank">
          Ver en Mapa
          <ion-icon name="map" slot="end"></ion-icon>
        </ion-button>
      </div>

      <ion-button expand="block" (click)="obtenerGPS()">
        <ion-icon name="locate" slot="start"></ion-icon>
        Obtener Coordenadas
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
