<!-- Componente de Cabecera con botón de ajustes -->
<app-header titulo="{{saludoUsuario}}" subtitulo="Tu colección de cine 🎬"></app-header>

<ion-content [fullscreen]="true">
  <!-- Header principal con botón de ajustes -->
  <ion-header [translucent]="true">
    <ion-toolbar color="primary">
      <ion-title>Mis Películas</ion-title>
      <!-- Avatar de perfil arriba a la derecha -->
      <ion-buttons slot="end">
        <ion-button routerLink="/ajustes" class="avatar-toolbar-btn" aria-label="Ir a opciones de perfil">
          <ion-avatar class="toolbar-avatar" *ngIf="photoService.foto; else avatarFallback">
            <img [src]="photoService.foto" alt="Foto de perfil" />
          </ion-avatar>
          <ng-template #avatarFallback>
            <ion-icon name="person-circle-outline" class="toolbar-avatar-fallback"></ion-icon>
          </ng-template>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <!-- Header colapsable para iOS -->
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Lista de Películas</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- SECCIÓN DE CARGA (SKELETON) -->
  <div *ngIf="cargando" style="padding: 16px;">
    <ion-grid>
      <ion-row class="ion-justify-content-center ion-align-items-stretch">
        <ion-col size="6" size-md="3" *ngFor="let item of skeletonArray">
          <ion-card>
            <ion-skeleton-text animated style="height: 200px; border-radius: 12px;"></ion-skeleton-text>
            <ion-card-content>
              <ion-skeleton-text animated style="width: 80%; margin: 8px auto;"></ion-skeleton-text>
              <ion-skeleton-text animated style="width: 60%; margin: 4px auto;"></ion-skeleton-text>
              <ion-skeleton-text animated style="width: 100%; margin: 8px auto 4px;"></ion-skeleton-text>
              <ion-skeleton-text animated style="width: 90%; margin: 4px auto;"></ion-skeleton-text>
              <ion-skeleton-text animated style="width: 70%; height: 32px; margin: 8px auto; border-radius: 20px;"></ion-skeleton-text>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <!-- SECCIÓN DE CONTENIDO REAL -->
  <div *ngIf="!cargando">
    <ion-card>
      <ion-card-content>
        <ion-searchbar
          placeholder="Buscar en servidor..."
          debounce="300"
          (ionInput)="onBuscar($event)">
        </ion-searchbar>

        <ion-item lines="none">
          <ion-select
            label="Ordenar"
            interface="popover"
            [value]="ordenSeleccionado"
            (ionChange)="onOrdenar($event)">
            <ion-select-option value="recent">Más recientes</ion-select-option>
            <ion-select-option value="az">Alfabético A-Z</ion-select-option>
            <ion-select-option value="za">Alfabético Z-A</ion-select-option>
          </ion-select>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Añadir Película 🎬</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-input
          label="Nombre"
          label-placement="floating"
          [(ngModel)]="nuevaPelicula.nombre">
        </ion-input>

        <ion-input
          label="Autor"
          label-placement="floating"
          [(ngModel)]="nuevaPelicula.autor">
        </ion-input>

        <ion-textarea
          label="Descripción"
          label-placement="floating"
          [(ngModel)]="nuevaPelicula.descripcion">
        </ion-textarea>

        <ion-input
          label="URL de imagen"
          label-placement="floating"
          [(ngModel)]="nuevaPelicula.img">
        </ion-input>

        <ion-button expand="block" class="ion-margin-top cta-add-btn" color="primary" (click)="agregarPelicula()">
          Añadir Película
        </ion-button>
      </ion-card-content>
    </ion-card>

    <!-- Mensaje cuando no hay películas -->
    <ion-card *ngIf="listaDePeliculas.length === 0" class="ion-text-center">
      <ion-card-content>
        <ion-icon name="film-outline" size="large" color="medium"></ion-icon>
        <h2>No hay películas disponibles</h2>
        <p>Agrega tu primera película usando el formulario de arriba</p>
      </ion-card-content>
    </ion-card>

    <!-- Grid de películas -->
    <ion-grid *ngIf="listaDePeliculas.length > 0">
      <ion-row class="ion-justify-content-center ion-align-items-stretch">
        <ion-col size="6" size-md="3" *ngFor="let p of listaDePeliculas">
          <app-listpeli [peliculas]="p" (eliminar)="eliminarPelicula($event)"></app-listpeli>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>

<!-- BOTÓN FLOTANTE ABAJO A LA DERECHA -->
<ion-fab slot="fixed" horizontal="end" vertical="bottom">
  <!-- Botón principal -->
  <ion-fab-button color="primary" (click)="mostrarInformacionFormulario()">
    <ion-icon name="information-circle-outline"></ion-icon>
  </ion-fab-button>

</ion-fab>
